<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Merlin</title>
  <link rel="stylesheet" href="hud.css">
  <link rel="stylesheet" href="visor.css">
  <link rel="stylesheet" href="copilot.css">
  <link rel="stylesheet" href="desktop.css">
</head>
<body>
  <!-- ── Setup overlay ──────────────────────── -->
  <div id="setup-overlay" class="overlay visible">
    <div id="setup-box" class="center-card">
      <div id="setup-logo">MERLIN</div>
      <div id="setup-subtitle">AI field intelligence</div>
      <div id="setup-provider-group">
        <label>Provider</label>
        <select id="setup-provider">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Anthropic</option>
          <option value="custom">Custom (OpenAI-compat)</option>
        </select>
      </div>
      <div id="setup-custom-url-group" class="hidden">
        <label>Base URL</label>
        <input id="setup-custom-url" type="url" placeholder="https://api.example.com/v1">
      </div>
      <div id="setup-key-group">
        <label>API Key</label>
        <input id="setup-api-key" type="password" placeholder="sk-..." autocomplete="off">
      </div>
      <div id="setup-advanced">
        <button id="setup-toggle-advanced" type="button">+ Advanced</button>
        <div id="setup-advanced-fields" class="hidden">
          <label>Merlin Server URL (optional)</label>
          <input id="setup-server-url" type="url" placeholder="ws://192.168.1.x:8765">
          <label class="checkbox-row">
            <input id="setup-cache-models" type="checkbox" checked>
            <span>Cache AI models offline</span>
          </label>
          <label class="checkbox-row">
            <input id="setup-sync-auto" type="checkbox" checked>
            <span>Auto-sync to PC server when available</span>
          </label>
          <label class="checkbox-row">
            <input id="setup-diary-save" type="checkbox" checked>
            <span>Save observations for later review</span>
          </label>
        </div>
      </div>
      <button id="setup-continue" class="primary-btn">CONTINUE</button>
      <div id="setup-error" class="error-msg"></div>
    </div>
  </div>

  <!-- ── Platform picker ─────────────────────── -->
  <div id="picker-overlay" class="overlay">
    <div id="picker-box" class="center-card">
      <div id="picker-logo">MERLIN</div>
      <div id="picker-subtitle">Choose how to use me</div>
      <div id="picker-options">
        <button id="pick-visor" class="picker-card">
          <span class="picker-icon">👁️</span>
          <span class="picker-title">Visor</span>
          <span class="picker-desc">Camera passthrough + AI overlay. See the world through Merlin's eyes.</span>
        </button>
        <button id="pick-copilot" class="picker-card">
          <span class="picker-icon">🎯</span>
          <span class="picker-title">Copilot</span>
          <span class="picker-desc">AI watches your screen, offers guidance and answers.</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Shared app shell ────────────────────── -->
  <div id="app" class="hidden">
    <!-- Status bar (top) -->
    <div id="status-bar">
      <span id="status-mode">SCOUT</span>
      <span id="status-connection" class="dot" title="Connection">●</span>
      <div id="status-indicators">
        <span id="ind-cam" class="indicator" title="Camera">CAM</span>
        <span id="ind-mic" class="indicator" title="Mic">MIC</span>
        <span id="ind-gps" class="indicator" title="GPS">GPS</span>
      </div>
      <span id="status-time">--:--</span>
    </div>

    <!-- Mode-specific content will render here -->
    <div id="content-area"></div>

    <!-- Panels container (shared) -->
    <div id="panel-container"></div>

    <!-- Mode tabs (bottom) -->
    <nav id="mode-tabs" aria-label="Activity modes">
      <button class="mode-tab" data-mode="WORK">WORK</button>
      <button class="mode-tab" data-mode="LIFT">LIFT</button>
      <button class="mode-tab" data-mode="WALK">WALK</button>
      <button class="mode-tab" data-mode="TALK">TALK</button>
      <button class="mode-tab" data-mode="NOTES">NOTES</button>
    </nav>

    <!-- Query bar -->
    <div id="query-bar">
      <input id="query-input" type="text" autocomplete="off" autocorrect="off"
             autocapitalize="off" spellcheck="false" placeholder="Ask Merlin…">
      <button id="query-mic" class="icon-btn" title="Push to talk">🎤</button>
      <button id="query-send" class="icon-btn" title="Send">▶</button>
    </div>
  </div>

  <!-- MediaPipe WASM scripts (loaded async) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm/vision_wasm_internal.js" defer></script>

  <!-- App modules -->
  <script type="module" src="lib/config.js"></script>
  <script type="module" src="lib/api.js"></script>
  <script type="module" src="lib/diary.js"></script>
  <script type="module" src="lib/sync.js"></script>
  <script type="module" src="lib/camera.js"></script>
  <script type="module" src="lib/screen.js"></script>
  <script type="module" src="lib/audio.js"></script>
  <script type="module" src="lib/vision.js"></script>
  <script type="module" src="lib/ws.js"></script>
  <script type="module" src="lib/notifications.js"></script>
  <script type="module" src="ui/panels.js"></script>
  <script type="module" src="ui/status-bar.js"></script>
  <script type="module" src="ui/mode-tabs.js"></script>
  <script type="module" src="ui/query-bar.js"></script>
  <script type="module" src="ui/visor-layout.js"></script>
  <script type="module" src="ui/copilot-layout.js"></script>
  <script type="module" src="ui/desktop-layout.js"></script>
  <script type="module" src="lib/main.js"></script>
</body>
</html>
